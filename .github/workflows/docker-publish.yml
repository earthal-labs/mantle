name: Docker Publish

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mantle-api
            dockerfile: Dockerfile.api
          - image: mantle-worker
            dockerfile: Dockerfile.worker
          - image: mantle-analytics
            dockerfile: Dockerfile.analytics
    steps:
      - uses: actions/checkout@v4

      - name: Add swap for Rust/DuckDB compile
        if: matrix.image != 'mantle-analytics'
        uses: ./.github/actions/setup-swap
        with:
          size-gb: "8"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-smoke:
    name: Compose smoke
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 20
    env:
      GHCR_IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image tag
        run: |
          # Must match docker/metadata-action type=sha,prefix=sha-,format=short
          SHORT="sha-${GITHUB_SHA::7}"
          echo "MANTLE_IMAGE_TAG=${SHORT}" >> "$GITHUB_ENV"
          echo "Pulling ${GHCR_IMAGE_PREFIX}/mantle-api:${SHORT}"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull prebuilt images and start stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull
          docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d
      - name: Wait for API health
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8080/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.yml -f docker-compose.ghcr.yml logs api
          exit 1
      - name: Smoke checks
        run: bash scripts/smoke.sh

  publish-summary:
    name: Publish summary
    runs-on: ubuntu-latest
    needs: [build-and-push, compose-smoke]
    if: success()
    steps:
      - name: Image tags
        run: |
          OWNER="${{ github.repository_owner }}"
          SHA="sha-${GITHUB_SHA::7}"
          echo "## Published images" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pull on EC2 with:" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "export GHCR_IMAGE_PREFIX=ghcr.io/${OWNER}" >> "$GITHUB_STEP_SUMMARY"
          echo "export MANTLE_IMAGE_TAG=${SHA}  # or latest" >> "$GITHUB_STEP_SUMMARY"
          echo "docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull" >> "$GITHUB_STEP_SUMMARY"
          echo "docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
