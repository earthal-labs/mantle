name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always
      CARGO_INCREMENTAL: "0"
      # Skip debuginfo — DuckDB/oxigdal-linked test binaries link much faster.
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - uses: actions/checkout@v4
      # GitHub runners have ~14 GiB free. A 12 GiB swapfile + Arrow/DuckDB
      # target/ artifacts exhaust the disk (os error 28). Free unused SDKs and
      # keep swap modest — sequential CARGO_BUILD_JOBS=1 needs far less than 12 G.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          df -h
      - uses: ./.github/actions/setup-swap
        with:
          size-gb: "4"
      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Unit tests live in lib targets only (no crates/*/tests/, bins have no tests).
      # Do NOT pass --bins: that links mantle-api/mantle-worker a second time for no coverage.
      #
      # Packages that transitively link DuckDB (and oxigdal) produce multi‑GB binaries.
      # Linking two of those at once on a 7 GiB runner thrash-swaps and can sit on
      # "Compiling mantle-api" for an hour. Build light crates in parallel, then
      # fat crates one package at a time with a single codegen job.

      - name: cargo test (light crates)
        env:
          CARGO_BUILD_JOBS: "2"
        run: >
          cargo test --lib
          -p mantle-config
          -p mantle-arrow
          -p mantle-cache
          -p mantle-render-ast
          -- --test-threads=2

      - name: cargo test (raster)
        env:
          CARGO_BUILD_JOBS: "1"
        run: cargo test --lib -p mantle-raster -- --test-threads=2

      - name: cargo test (catalog)
        env:
          CARGO_BUILD_JOBS: "1"
        run: cargo test --lib -p mantle-catalog -- --test-threads=2

      - name: cargo test (ingestion)
        env:
          CARGO_BUILD_JOBS: "1"
        run: cargo test --lib -p mantle-ingestion -- --test-threads=2

      - name: cargo test (stac)
        env:
          CARGO_BUILD_JOBS: "1"
        run: cargo test --lib -p mantle-stac -- --test-threads=2

      - name: cargo test (ogc)
        env:
          CARGO_BUILD_JOBS: "1"
        run: cargo test --lib -p mantle-ogc -- --test-threads=2

      - name: cargo test (worker)
        env:
          CARGO_BUILD_JOBS: "1"
        run: cargo test --lib -p mantle-worker -- --test-threads=2

      - name: cargo test (api)
        env:
          CARGO_BUILD_JOBS: "1"
        run: cargo test --lib -p mantle-api -- --test-threads=2

      - name: integration contract tests
        env:
          CARGO_BUILD_JOBS: "1"
        run: cargo test -p mantle-integration-tests --test contracts -- --test-threads=1

  python:
    name: Python
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"
      - name: Sync dev dependencies
        run: uv sync --extra dev --frozen
      - name: pytest
        run: uv run pytest

  compose:
    name: Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker compose config
        run: docker compose config

  compose-smoke:
    name: Compose smoke
    runs-on: ubuntu-latest
    # Pull prebuilt GHCR images for this commit (Docker Publish runs in parallel).
    # Skip on PRs — building Rust images on the runner is too slow/memory-heavy.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [rust, python, compose]
    # Allow time for Docker Publish to finish the api image (~45–50m) if it lags Rust.
    timeout-minutes: 60
    env:
      GHCR_IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve short image tag
        run: |
          SHORT="sha-$(echo '${{ github.sha }}' | cut -c1-7)"
          echo "MANTLE_IMAGE_TAG=${SHORT}" >> "$GITHUB_ENV"
          echo "Waiting for ${GHCR_IMAGE_PREFIX}/mantle-api:${SHORT}"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull prebuilt images and start stack
        run: |
          # Docker Publish tags sha-<short>; poll until this commit's images exist.
          for i in $(seq 1 60); do
            if docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull; then
              break
            fi
            echo "Images not ready yet (attempt ${i}/60); sleeping 30s..."
            sleep 30
          done
          docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull
          docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d
      - name: Wait for API health
        run: |
          for i in $(seq 1 90); do
            if curl -sf http://localhost:8080/health; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.yml -f docker-compose.ghcr.yml logs api
          exit 1
      - name: Smoke checks
        run: bash scripts/smoke.sh
