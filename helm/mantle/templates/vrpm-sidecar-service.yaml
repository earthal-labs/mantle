{{- if .Values.vrpmSidecar.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mantle.fullname" . }}-vrpm-sidecar
  labels:
    {{- include "mantle.labels" . | nindent 4 }}
    app.kubernetes.io/component: vrpm-sidecar
spec:
  type: {{ .Values.vrpmSidecar.service.type }}
  ports:
    - port: {{ .Values.vrpmSidecar.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "mantle.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: vrpm-sidecar
{{- end }}
