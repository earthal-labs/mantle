apiVersion: v1
kind: Service
metadata:
  name: {{ include "mantle.fullname" . }}-ray-head
  labels:
    {{- include "mantle.labels" . | nindent 4 }}
    app.kubernetes.io/component: ray-head
spec:
  type: ClusterIP
  ports:
    - name: client
      port: {{ .Values.ray.head.service.clientPort }}
      targetPort: client
    - name: dashboard
      port: {{ .Values.ray.head.service.dashboardPort }}
      targetPort: dashboard
    - name: gcs
      port: {{ .Values.ray.head.service.gcsPort }}
      targetPort: gcs
  selector:
    {{- include "mantle.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ray-head
